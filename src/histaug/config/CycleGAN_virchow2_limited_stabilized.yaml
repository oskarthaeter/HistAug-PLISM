# Experiment 1: Stabilized baseline.
# Adds gradient clipping (norm=1.0) and a real replay buffer (size 50 vs 1).
# Everything else identical to CycleGAN_virchow2_limited.yaml so the effect
# of these two low-risk changes can be isolated.

paired_data: /mnt/data/plismbench/features/CycleGAN/virchow2_all_pairs_meta/train.pt
val_data:    /mnt/data/plismbench/features/CycleGAN/virchow2_all_pairs_meta/val.pt
feature_dim: 2560

filter_scanners: [GT450, P, S360, SQ]

discriminator_hidden_dim: 64
discriminator_dropout: 0.3
discriminator_use_spectral_norm: true
hidden_dims: [512, 256]
use_film: true

batch_size: 256
epochs: 30
lr: 2.0e-4
lr_d: 1.0e-5
lr_decay_epochs: 10
beta1: 0.5
beta2: 0.999

lambda_cyc: 5.0
lambda_idt: 0.5
lambda_paired: 10.0
lambda_adv: 0.1
loss_alpha: 0.2
loss_delta: 0.5
lambda_coral: 0.05
lambda_rel: 0.1

# Stabilization: gradient clipping + meaningful replay buffer.
grad_clip_norm: 1.0
replay_buffer_size: 50   # was 1 in the base config

data_fraction: 0.10
seed: 2025
num_workers: 8
save_interval: null
log_interval: 1
output_dir: /workspaces/HistAug-PLISM/src/histaug/logs/cyclegan/virchow2_limited_stabilized

wandb_project: HistAug-PLISM
wandb_run_name: virchow2-cyclegan-limited-stabilized
wandb_group: CycleGAN
wandb_tags: [virchow2, tgt-only, film, GT450-P-S360-SQ, grad-clip, replay50]
